<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Birthday, Gowtham!</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ffefba 0%, #ffffff 100%);
      color: #333;
    }
    .card {
      text-align: center;
      padding: 48px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      background: white;
      max-width: 700px;
    }
    h1 {
      margin: 0 0 8px 0;
      font-size: 44px;
      color: #ff6b6b;
    }
    p {
      margin: 0 0 16px 0;
      font-size: 18px;
    }
    .emoji {
      font-size: 28px;
      margin-left: 6px;
    }
    .footer {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Happy Birthday, Gowtham! <span class="emoji">🎉</span></h1>
    <p>Wishing you a wonderful day filled with joy and good memories.</p>
    <p class="footer">— From your friend</p>
  </div>
</body>
</html>
